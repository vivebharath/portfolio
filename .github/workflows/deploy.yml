name: Deploy Review Site

on:
  push:
    branches: [ "main" ]

# Global permissions fallback
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # JOB 1: Compile and upload the production package
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Project
        run: npm run build

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  # JOB 2: Grab the uploaded artifact and push live with explicit access
  deploy:
    needs: build
    permissions:
      pages: write      # 👈 Explicitly forces authorization on this runner instance
      id-token: write   # 👈 Required for secure OIDC handoff token validation
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4